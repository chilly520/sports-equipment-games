<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  
  <!-- 内圈装饰 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4"/>
  
  <!-- 靶心/目标图标 -->
  <circle cx="256" cy="220" r="90" fill="none" stroke="#fff" stroke-width="12"/>
  <circle cx="256" cy="220" r="60" fill="none" stroke="#fff" stroke-width="8"/>
  <circle cx="256" cy="220" r="30" fill="#fff"/>
  <circle cx="256" cy="220" r="12" fill="#10B981"/>
  
  <!-- 运动小人 -->
  <g transform="translate(180, 310)">
    <!-- 头 -->
    <circle cx="76" cy="20" r="22" fill="#fff"/>
    <!-- 身体 -->
    <path d="M76 45 L76 95 M76 55 L40 80 M76 55 L112 80 M76 95 L56 140 M76 95 L96 140" 
          stroke="#fff" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- 装饰元素 -->
  <circle cx="120" cy="130" r="15" fill="rgba(255,255,255,0.3)"/>
  <circle cx="392" cy="150" r="10" fill="rgba(255,255,255,0.25)"/>
  <circle cx="380" cy="380" r="18" fill="rgba(255,255,255,0.2)"/>
</svg>
